<div class="main flex flex-col w-screen h-screen bg-linear-to-br from-[#ecffe6] to-[#090979] m-0 p-0 overflow-hidden">

    <div  class="nav absolute flex justify-between mx-auto border-2 border-white rounded-lg m-3 relative">
        <div *ngIf="kindOfUser!='admin'" class="slider" [style.transform]="'translateX(' + selectedIndex * 100 + '%)'"></div>
        <a routerLink="/home/books"  routerLinkActive="active" class="nav-item" [ngClass]="{'selected' : selectedIndex === 0, 'text-black bg-white': kindOfUser=='admin'}" (click)="selectNav(0)">Home</a>
        <a *ngIf="kindOfUser!='admin'" routerLink="/home/orders" routerLinkActive="active" class="nav-item" [class.selected]="selectedIndex === 1" (click)="selectNav(1)">Orders</a>
        <a *ngIf="kindOfUser!='admin'" routerLink="/home/carts" routerLinkActive="active" class="nav-item" [class.selected]="selectedIndex === 2" (click)="selectNav(2)">Cart</a>
    </div>

    <div *ngIf="kindOfUser=='admin'" class="addbook absolute top-2 right-44 flex gap-2 items-center border-2 border-black text-white p-3 rounded-lg cursor-pointer hover:text-black hover:bg-white"  (click)="addBook()">
        <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor" class="bi bi-file-plus-fill" viewBox="0 0 16 16">
            <path d="M12 0H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2M8.5 6v1.5H10a.5.5 0 0 1 0 1H8.5V10a.5.5 0 0 1-1 0V8.5H6a.5.5 0 0 1 0-1h1.5V6a.5.5 0 0 1 1 0"/>
        </svg>
        <h6>Add Book</h6>
    </div>

    <div class="logout absolute top-2 right-8 flex gap-2 items-start border-2 border-black text-white p-3 rounded-lg cursor-pointer hover:text-black hover:bg-white"  (click)="logout()">
        <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor" class="bi bi-box-arrow-left" viewBox="0 0 16 16">
            <path fill-rule="evenodd" d="M6 12.5a.5.5 0 0 0 .5.5h8a.5.5 0 0 0 .5-.5v-9a.5.5 0 0 0-.5-.5h-8a.5.5 0 0 0-.5.5v2a.5.5 0 0 1-1 0v-2A1.5 1.5 0 0 1 6.5 2h8A1.5 1.5 0 0 1 16 3.5v9a1.5 1.5 0 0 1-1.5 1.5h-8A1.5 1.5 0 0 1 5 12.5v-2a.5.5 0 0 1 1 0z"/>
            <path fill-rule="evenodd" d="M.146 8.354a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L1.707 7.5H10.5a.5.5 0 0 1 0 1H1.707l2.147 2.146a.5.5 0 0 1-.708.708z"/>
        </svg>
        <h6>Logout</h6>
    </div>

    <div class="bottom overflow-y-scroll">
        <router-outlet></router-outlet>
    </div>
</div>
