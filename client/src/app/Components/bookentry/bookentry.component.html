<div class="book-entry absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 border-2 border-black p-6 rounded-lg bg-white w-[400px]">
    <h2 class="text-2xl font-bold mb-4">Add New Book</h2>
    <div class="book-form backdrop-blur-sm bg-white rounded-lg">
        <div class="title mb-4">
            <label for="title" class="block text-sm font-medium text-gray-700">Title</label>
            <input type="text" [(ngModel)]="title" id="title" name="title" required class="mt-1 p-1 block w-full border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" placeholder="Enter Title of Book">
        </div>
        <div class="author mb-4">
            <label for="author" class="block text-sm font-medium text-gray-700">Author</label>
            <input type="text" [(ngModel)]="author" id="author"  name="author" required class="mt-1 p-1 block w-full border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" placeholder="Enter Author of Book">
        </div>
        <div class="url mb-4">
            <label for="url" class="block text-sm font-medium text-gray-700">URL</label>
            <input type="text" [(ngModel)]="url" id="url" name="url" required class="mt-1 p-1 block w-full border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" placeholder="Enter URL of Book">
        </div>
        <div class="price mb-4">
            <label for="price" class="block text-sm font-medium text-gray-700">Price</label>
            <input type="number" [(ngModel)]="price" id="price" name="price" required class="mt-1 p-1 block w-full border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" placeholder="Enter Price of Book">
        </div>
        <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 cursor-pointer" (click)="onAddBook()">Add Book</button>
    </div>
</div>
